name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    - name: Install frontend deps
      run: cd frontend && npm ci --ignore-scripts
    - name: Build frontend
      run: cd frontend && npm run build
    - name: Setup Capacitor
      uses: nvm-sh/setup-nvm@v2
      with:
        node-version: '20'
    - run: npm install -g @capacitor/cli@5
    - name: Capacitor add android
      run: cd frontend && npx cap add android
    - name: Cap sync
      run: cd frontend && npx cap copy
    - name: Cap build android
      run: cd frontend && npx cap build android
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: shopply.apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
