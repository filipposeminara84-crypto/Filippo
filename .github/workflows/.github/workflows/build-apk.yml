name: Build APK
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: false  # Disabilita cache completamente
    - name: Install deps frontend
      run: cd frontend && npm install --legacy-peer-deps --no-audit
    - name: Build React
      run: cd frontend && npm run build
    - name: Install Cap CLI
      run: npm install -g @capacitor/cli@5 --legacy-peer-deps
    - name: Cap add android
      run: cd frontend && npx cap add android
    - name: Cap sync
      run: cd frontend && npx cap copy
    - name: Cap build
      run: cd frontend && npx cap build android
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: shopply.apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
